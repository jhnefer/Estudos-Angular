<div class="flex flex-column gap-4 mb-5">
  <div class="flex flex-column md:flex-row md:align-items-center md:justify-content-between gap-3 border-bottom-1 pb-3">
    <div>
      <h1 class="text-2xl font-bold m-0 text-600">Gestão de Usuários</h1>
      <p class="text-sm text-500 m-0">{{ userService.users().length }} usuários cadastrados</p>
    </div>

    <div class="flex flex-column sm:flex-row sm:align-items-center gap-3">
      <p-iconfield iconPosition="left" class="w-full sm:w-20rem">
        <p-inputicon class="pi pi-search"></p-inputicon>
        <input pInputText type="text" [formControl]="searchControl" placeholder="Buscar por nome ou email..."
               class="w-full text-sm" />
      </p-iconfield>
      
      <button pButton type="button" icon="pi pi-plus" label="Novo Usuário" 
              class="p-button-primary w-full sm:w-auto"
              (click)="openNewUser()"></button>
    </div>
  </div>

  <p-table [value]="filteredUsers()" class="p-datatable-sm" [responsiveLayout]="'scroll'">
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 80px">ID</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Perfil</th>
        <th>Status</th>
        <th style="width: 120px" class="text-center">Ações</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.id }}</td>
        <td class="font-medium">{{ user.name }}</td>
        <td class="text-500">{{ user.email }}</td>
        <td>
          <span class="badge {{ getRoleLabel(user.role).color }}">
            <i [class]="'pi ' + getRoleLabel(user.role).icon"></i>
            {{ getRoleLabel(user.role).label }}
          </span>
        </td>
        <td>
          <span class="badge" [class.badge-success]="user.status === 'ativo'" [class.badge-secondary]="user.status !== 'ativo'">
            {{ user.status }}
          </span>
        </td>
        <td class="text-center">
          <div class="flex justify-content-center gap-1">
            <button pButton type="button" icon="pi pi-pencil" class="p-button-rounded p-button-text p-button-sm p-button-secondary"
                    (click)="openEditUser(user)"></button>
            <button pButton type="button" icon="pi pi-trash" class="p-button-rounded p-button-text p-button-danger p-button-sm"
                    (click)="deleteUser(user)"></button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog [(visible)]="dialogOpen" [modal]="true" [style]="{ width: '600px' }" [closable]="false" [header]="dialogTitle">
  <div class="p-3" [formGroup]="userForm">
    @if (errorMessage()) {
      <div class="p-3 mb-4 border-round bg-red-50 text-red-700 border-1 border-red-100 flex align-items-start gap-2">
        <i class="pi pi-exclamation-circle mt-1"></i>
        <span class="text-sm font-medium">{{ errorMessage() }}</span>
      </div>
    }

    <div class="grid p-fluid">
      <div class="col-12 flex flex-column gap-1.5 mb-3">
        <label class="text-xs font-bold uppercase text-500">Nome Completo</label>
        <input pInputText type="text" formControlName="name" placeholder="Ex: João Silva" class="p-inputtext-sm" 
               [class.ng-invalid]="userForm.get('name')?.invalid && userForm.get('name')?.touched" />
      </div>

      <div class="col-12 flex flex-column gap-1.5 mb-3">
        <label class="text-xs font-bold uppercase text-500">E-mail</label>
        <input pInputText type="email" formControlName="email" placeholder="usuario@exemplo.com" class="p-inputtext-sm"
               [class.ng-invalid]="userForm.get('email')?.invalid && userForm.get('email')?.touched" />
      </div>

      <div class="col-6 flex flex-column gap-1.5">
        <label class="text-xs font-bold uppercase text-500">Perfil</label>
        <p-select [options]="roles" formControlName="role" optionLabel="label" optionValue="value" size="small" placeholder="Selecione" class="w-full"></p-select>
      </div>
      <div class="col-6 flex flex-column gap-1.5">
        <label class="text-xs font-bold uppercase text-500">Status</label>
        <p-select [options]="statuses" formControlName="status" optionLabel="label" optionValue="value" size="small" placeholder="Selecione" class="w-full"></p-select>
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2 p-2">
      <button pButton type="button" label="Cancelar" class="p-button-text p-button-secondary" (click)="closeDialog()"></button>
      <button pButton type="button" [label]="editingUser() ? 'Salvar' : 'Criar Usuário'" class="p-button-primary px-4" (click)="saveUser()"></button>
    </div>
  </ng-template>
</p-dialog>
