<div class="content-container">
  <router-outlet></router-outlet>
</div>

<!-- Global Confirm Dialog -->
<p-confirmDialog maskStyleClass="backdrop-blur-sm" [closable]="false" styleClass="!border-0 !bg-transparent">
    <ng-template #headless let-message let-onAccept="onAccept" let-onReject="onReject">
        <div class="flex flex-column px-6 py-6 gap-5 rounded-2xl w-22rem shadow-8" 
             style="border-radius: 12px; background-image: radial-gradient(circle at left top, var(--p-primary-200, #a7f3d0), var(--p-primary-400, #34d399))">
            
            <div class="flex justify-content-center">
                <svg width="31" height="33" viewBox="0 0 31 33" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-4rem w-4rem">
                    <path d="M15.1934 0V0V0L0.0391235 5.38288L2.35052 25.3417L15.1934 32.427V32.427V32.427L28.0364 25.3417L30.3478 5.38288L15.1934 0Z" fill="white" />
                    <mask id="mask0_1_52" style="mask-type:luminance" maskUnits="userSpaceOnUse" x="0" y="0" width="31" height="33">
                        <path d="M15.1934 0V0V0L0.0391235 5.38288L2.35052 25.3417L15.1934 32.427V32.427V32.427L28.0364 25.3417L30.3478 5.38288L15.1934 0Z" fill="white" />
                    </mask>
                    <g mask="url(#mask0_1_52)">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M15.1935 0V3.5994V3.58318V20.0075V20.0075V32.427V32.427L28.0364 25.3417L30.3478 5.38288L15.1935 0Z" fill="rgba(0,0,0,0.1)" />
                    </g>
                    <path d="M19.6399 15.3776L18.1861 15.0547L19.3169 16.6695V21.6755L23.1938 18.4458V12.9554L21.4169 13.6013L19.6399 15.3776Z" fill="var(--p-primary-700)" />
                    <path d="M10.5936 15.3776L12.0474 15.0547L10.9166 16.6695V21.6755L7.03966 18.4458V12.9554L8.81661 13.6013L10.5936 15.3776Z" fill="var(--p-primary-700)" />
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M11.3853 16.9726L12.6739 15.0309L13.4793 15.5163H16.7008L17.5061 15.0309L18.7947 16.9726V24.254L17.8283 25.7103L16.7008 26.843H13.4793L12.3518 25.7103L11.3853 24.254V16.9726Z" fill="var(--p-primary-700)" />
                    <path d="M19.3168 24.7437L21.4168 22.6444V20.5451L19.3168 22.3214V24.7437Z" fill="var(--p-primary-700)" />
                    <path d="M10.9166 24.7437L8.81662 22.6444V20.5451L10.9166 22.3214V24.7437Z" fill="var(--p-primary-700)" />
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M13.0167 5.68861L11.7244 8.7568L13.8244 14.8932H14.7936V5.68861H13.0167ZM15.4397 5.68861V14.8932H16.5706L18.5091 8.7568L17.2167 5.68861H15.4397Z" fill="var(--p-primary-700)" />
                    <path d="M13.8244 14.8932L6.87813 12.3094L5.90888 8.27235L11.8859 8.7568L13.9859 14.8932H13.8244Z" fill="var(--p-primary-700)" />
                    <path d="M16.5706 14.8932L23.5169 12.3094L24.4861 8.27235L18.3476 8.7568L16.4091 14.8932H16.5706Z" fill="var(--p-primary-700)" />
                    <path d="M18.8321 8.27235L22.2245 7.94938L19.9629 5.68861H17.7013L18.8321 8.27235Z" fill="var(--p-primary-700)" />
                    <path d="M11.4013 8.27235L8.00893 7.94938L10.2705 5.68861H12.5321L11.4013 8.27235Z" fill="var(--p-primary-700)" />
                </svg>
            </div>
            
            <div class="flex flex-column align-items-center gap-2">
                <span class="font-bold text-2xl text-primary-900 text-center">
                    {{ message.header }}
                </span>
                <p class="text-primary-800 text-center m-0 px-2 text-sm line-height-3 font-semibold">
                    {{ message.message }}
                </p>
            </div>

            <div class="flex align-items-center gap-3 w-full mt-2">
                <!-- Botão Cancelar -->
                <p-button 
                    label="Cancelar" 
                    (click)="onReject()" 
                    styleClass="!p-3 w-full !bg-primary-700 !text-white !border-0 font-bold hover:!bg-primary-800" 
                    class="w-full" />
                
                <!-- Botão Confirmar -->
                <p-button 
                    label="Confirmar" 
                    (click)="onAccept()" 
                    styleClass="!p-3 w-full !bg-primary-700 !text-white !border-0 font-bold hover:!bg-primary-800" 
                    class="w-full" />
            </div>
        </div>
    </ng-template>
</p-confirmDialog>
