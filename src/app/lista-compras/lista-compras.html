<div class="container">
    <h1>Lista de Compras</h1>

    <form #form="ngForm" class="add-item-form" (ngSubmit)="adicionarItem()">
        <input type="text" id="item"
        name="item"
        [(ngModel)]="item" 
        placeholder="Digite um item..." />
        <button type="submit">Adicionar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Item</th>
                <th></th>
            </tr>
        </thead>

        <tr>
            <td>1</td>
            <td>Leite</td>
            <td><input type="checkbox"></td>
        </tr>
        <tr>
            <td>2</td>
            <td>Pão</td>
            <td><input type="checkbox"></td>
    </table>

</div>
